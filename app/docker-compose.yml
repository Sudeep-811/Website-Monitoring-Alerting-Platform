version: '3.8'

services:
  shopease-api:
    build: .
    container_name: shopease-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - APP_VERSION=1.0.0
      - APP_ENV=production
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
